name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Change this to master if your default branch is master
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          # Automatically injects the GitHub repository name as the base path prefix
          # e.g., /repository-name/ for GitHub Pages
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_API_URL: https://pdfmaster-backend-thhj.onrender.com
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send Email on Failure
        if: failure()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ PDFMaster Deployment Failed"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: GitHub Actions <no-reply@github.com>
          body: "The PDFMaster deployment has failed for commit ${{ github.sha }}. Check the actions run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Send Email on Success
        if: success()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ PDFMaster Deployment Succeeded"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: GitHub Actions <no-reply@github.com>
          body: "The PDFMaster deployment has completed successfully. Your site is live: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

